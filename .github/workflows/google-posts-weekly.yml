name: Grande Bleu Google Posts Weekly Generate

on:
  schedule:
    # 매주 월요일 KST 01:00 = 일요일 UTC 16:00. today 렌더(UTC 19:00)보다 먼저 current.json 갱신.
    - cron: "0 16 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: google-posts-weekly
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate weekly 4-language posts (Gemini Pro → flash fallback)
        env:
          REPO_DIR: ${{ github.workspace }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 .github/scripts/google_posts_generate_cloud.py

      - name: Commit weekly content
        run: |
          git config user.email "jm7397776@gmail.com"
          git config user.name "jm7397776-byte"
          git add google_posts/
          if ! git diff --cached --quiet; then
            git commit -m "google posts weekly generate $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin main
            curl -fsS "https://purge.jsdelivr.net/gh/jm7397776-byte/grandebleu-photos@main/google_posts/current.json" || true
          else
            echo "No weekly change"
          fi

      - name: Notify failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG=$(printf '⚠️ 그랑블루 구글 GBP 주간 생성 실패\nworkflow: %s\nrun: %s/%s/actions/runs/%s' "$GITHUB_WORKFLOW" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${MSG}" || true
          fi
