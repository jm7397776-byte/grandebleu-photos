name: Grande Bleu Blog Safe Publish

on:
  schedule:
    # 매일 아침 9시 발행: KST 09:08 = UTC 00:08. 비혼잡 분. 워치독이 누락 시 자가복구.
    - cron: "8 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: blog-publish-today
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Publish blog_today safely
        env:
          REPO_DIR: ${{ github.workspace }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_SAFE_CLIENT_ID: ${{ secrets.BLOGGER_SAFE_CLIENT_ID }}
          BLOGGER_SAFE_CLIENT_SECRET: ${{ secrets.BLOGGER_SAFE_CLIENT_SECRET }}
          BLOGGER_SAFE_REFRESH_TOKEN: ${{ secrets.BLOGGER_SAFE_REFRESH_TOKEN }}
          MAIL2BLOGGER_EMAIL: ${{ secrets.MAIL2BLOGGER_EMAIL }}
          GMAIL_SEND_CLIENT_ID: ${{ secrets.GMAIL_SEND_CLIENT_ID }}
          GMAIL_SEND_CLIENT_SECRET: ${{ secrets.GMAIL_SEND_CLIENT_SECRET }}
          GMAIL_SEND_REFRESH_TOKEN: ${{ secrets.GMAIL_SEND_REFRESH_TOKEN }}
          GMAIL_SEND_USER: ${{ secrets.GMAIL_SEND_USER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          python3 .github/scripts/blog_publish_today_safe.py

      - name: Commit publish state
        run: |
          git config user.email "jm7397776@gmail.com"
          git config user.name "jm7397776-byte"
          git add blog_publish_today_state.json blog_queue/publish_today.log 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "blog publish today state $(date -u +%Y-%m-%dT%H:%MZ)"
            # push 경합 해소 (2026-07-05): 동시 커밋과 충돌 시 rebase 후 재시도
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              sleep $((i * 5))
            done
          else
            echo "No publish state change"
          fi

      - name: Notify publish success
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python3 .github/scripts/blog_publish_report.py

      - name: Notify publish failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG=$(printf '⚠️ 그랑블루 외국인용 블로그 업로드 실패\nworkflow: %s\nrun: %s/%s/actions/runs/%s\nCodex 자동 복구 감시가 다음 주기에 확인합니다.' "$GITHUB_WORKFLOW" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${MSG}" || true
          fi
