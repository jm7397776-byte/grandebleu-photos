name: Grande Bleu Blog Today Render

on:
  schedule:
    # KST 13:30 = UTC 04:30. Make Blogger publish should run after this.
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: blog-today
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render blog_today.json
        env:
          REPO_DIR: ${{ github.workspace }}
          GRANDEBLEU_KLOOK_URL: ${{ secrets.GRANDEBLEU_KLOOK_URL }}
        run: |
          python3 .github/scripts/blog_today_render_cloud.py

      - name: Commit rendered JSON
        run: |
          git config user.email "jm7397776@gmail.com"
          git config user.name "jm7397776-byte"
          git add blog_today.json blog_today_history.json blog_queue
          if ! git diff --cached --quiet; then
            git commit -m "blog_today render $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin main
            curl -fsS "https://purge.jsdelivr.net/gh/jm7397776-byte/grandebleu-photos@main/blog_today.json" || true
          else
            echo "No blog_today change"
          fi

      - name: Notify render failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG=$(printf '⚠️ 그랑블루 외국인용 블로그 글 생성 실패\nworkflow: %s\nrun: %s/%s/actions/runs/%s\nCodex 자동 복구 감시가 다음 주기에 확인합니다.' "$GITHUB_WORKFLOW" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${MSG}" || true
          fi
