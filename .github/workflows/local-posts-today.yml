name: Grande Bleu Local Posts Today Render

on:
  schedule:
    # KST 10:30 = UTC 01:30. Make.com can fetch after this.
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: local-posts-today
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render local channel payload
        env:
          REPO_DIR: ${{ github.workspace }}
        run: |
          python3 .github/scripts/local_posts_render_cloud.py

      - name: Commit rendered local post payload
        run: |
          git config user.email "jm7397776@gmail.com"
          git config user.name "jm7397776-byte"
          git add local_posts/today.json local_posts/history.json
          if ! git diff --cached --quiet; then
            git commit -m "local posts render $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin main
            curl -fsS "https://purge.jsdelivr.net/gh/jm7397776-byte/grandebleu-photos@main/local_posts/today.json" || true
          else
            echo "No local post change"
          fi

      - name: Notify local post package ready
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            python3 - <<'PY' > /tmp/local_posts_message.txt
          import json
          from pathlib import Path

          data = json.loads(Path("local_posts/today.json").read_text(encoding="utf-8"))
          daangn = data["channels"]["daangn"]
          kakao = data["channels"]["kakao_channel"]

          lines = [
              "✅ 그랑블루 당근/카카오채널 패키지 생성 완료",
              f"date: {data.get('date')}",
              f"topic: {data.get('topic_title')}",
              "",
              "🥕 당근",
              daangn["title"],
              daangn["body"],
              "",
              "사진:",
              *daangn["image_urls"],
              f"예약 링크: {daangn['cta_url']}",
              "",
              "💬 카카오채널",
              kakao["title"],
              kakao["body"],
              "",
              "사진:",
              *kakao["image_urls"],
              f"버튼: {kakao['button_title']} / {kakao['button_url']}",
              "",
              f"원본 JSON: {data['make']['source_url']}",
              f"workflow: https://github.com/{__import__('os').environ['GITHUB_REPOSITORY']}/actions/runs/{__import__('os').environ['GITHUB_RUN_ID']}",
          ]
          print("\n".join(lines))
          PY
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              --data-urlencode "text@/tmp/local_posts_message.txt" || true
          fi

      - name: Notify local post render failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG=$(printf '⚠️ 그랑블루 당근/카카오채널 Make 피드 생성 실패\nworkflow: %s\nrun: %s/%s/actions/runs/%s' "$GITHUB_WORKFLOW" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${MSG}" || true
          fi
